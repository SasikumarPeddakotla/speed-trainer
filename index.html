<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Speed Trainer</title>
    <link rel="icon" type="image/png" href="assets/favicon.png" />
    <link rel="manifest" href="manifest.json" />
    <meta name="theme-color" content="#2563eb" />

    <link rel="stylesheet" href="css/style.css" />
  </head>

  <body>
    <div class="card">
      <div class="header">
        <h1>⚡ Speed Trainer</h1>

        <div class="header-buttons">
          <button id="settingsBtn">⚙</button>
        </div>
      </div>

      <div class="stats">
        <span>✔ <b id="correct">0</b></span>

        <span>✖ <b id="wrong">0</b></span>

        <span>🔥 <b id="streak">0</b></span>

        <span>🎯 <b id="accuracyLabel">100%</b></span>
      </div>

      <div id="statusBar" class="statusBar">
        <span id="statusDisplay"></span>

        <button id="restartBtn" style="display: none">🔄 Reset</button>
      </div>

      <select id="modeSelect">
        <optgroup label="Alphabet">
          <option value="l2p">Letter → Position</option>
          <option value="p2l">Position → Letter</option>
          <option value="l2rp">Letter → Reverse Position</option>
          <option value="rp2l">Reverse Position → Letter</option>
          <option value="mirror">Mirror Letter</option>
        </optgroup>

        <optgroup label="Math">
          <option value="add">Addition</option>
          <option value="sub">Subtraction</option>
          <option value="mul">Multiplication</option>
          <option value="div">Division</option>
          <option value="table">Tables</option>
        </optgroup>

        <optgroup label="Powers and Roots">
          <option value="square">Squares (n²)</option>
          <option value="cube">Cubes (n³)</option>
          <option value="squareRoot">Square Roots (√n)</option>
          <option value="cubeRoot">Cube Roots (∛n)</option>
        </optgroup>

        <optgroup label="Conversions">
          <option value="fractionPercentage">Fraction ↔ Percentage</option>
          <option value="fractionDecimal">Fraction ↔ Decimal</option>
          <option value="decimalPercentage">Decimal ↔ Percentage</option>
        </optgroup>
      </select>

      <div id="optionsContainer" style="display: none">
        <select id="difficultySelect"></select>

        <select id="tableLimitSelect" style="display: none"></select>
      </div>

      <div id="readyPanel">
        <button id="startBtn">▶ Start</button>
      </div>

      <div id="questionArea">
        <div id="questionDisplay"></div>

        <div class="answerContainer">
          <input id="answerInput" readonly autocomplete="off" />

          <button id="backspaceBtn" type="button">⌫</button>
        </div>

        <div id="feedbackLabel"></div>

        <div id="keyboardContainer" class="keyboardContainer"></div>
      </div>

      <div id="modalContainer"></div>
    </div>

    <script src="js/state.js"></script>

    <script src="js/utils.js"></script>

    <script src="js/generators.js"></script>

    <script src="js/keyboard.js"></script>

    <script src="js/validator.js"></script>

    <script src="js/modal.js"></script>

    <script src="js/settings.js"></script>

    <script src="js/practiceModes.js"></script>

    <script src="js/session.js"></script>

    <script src="js/summary.js"></script>

    <script src="js/flashcard.js"></script>

    <script src="./data/fractions.js"></script>

    <script src="js/app.js"></script>
  </body>
</html>
